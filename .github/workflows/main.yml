name: Get YouTube Refresh Token (Device Flow)

on:
  workflow_dispatch:

jobs:
  auth:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install requests

      - name: Get Refresh Token
        env:
          CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          PYTHONUNBUFFERED: "1"
        shell: bash
        run: |
          python - <<'PY'
          import os
          import sys
          import json
          import time
          import requests

          CLIENT_ID = os.environ["CLIENT_ID"].strip()
          CLIENT_SECRET = os.environ["CLIENT_SECRET"].strip()
          SUMMARY = os.environ.get("GITHUB_STEP_SUMMARY")

          DEVICE_URL = "https://oauth2.googleapis.com/device/code"
          TOKEN_URL = "https://oauth2.googleapis.com/token"
          SCOPE = "https://www.googleapis.com/auth/youtube.upload"

          print("Requesting Device Code...", flush=True)

          r = requests.post(
              DEVICE_URL,
              data={
                  "client_id": CLIENT_ID,
                  "scope": SCOPE
              },
              timeout=30
          )

          print("HTTP:", r.status_code, flush=True)
          print(r.text, flush=True)

          if r.status_code != 200:
              sys.exit(1)

          d = r.json()

          verification_url = d["verification_url"]
          user_code = d["user_code"]
          device_code = d["device_code"]
          interval = int(d.get("interval", 5))
          expires = int(d.get("expires_in", 1800))

          print()
          print("=" * 60, flush=True)
          print("Verification URL :", verification_url, flush=True)
          print("User Code        :", user_code, flush=True)
          print("Expires In       :", expires, flush=True)
          print("Interval         :", interval, flush=True)
          print("=" * 60, flush=True)

          if SUMMARY:
              with open(SUMMARY, "w", encoding="utf-8") as f:
                  f.write(f"""# Google Device Flow

**Verification URL**

{verification_url}

**User Code**

# {user_code}

---

Mở link trên, nhập mã và bấm **Allow**.

Workflow sẽ đợi **120 giây** trước khi bắt đầu polling.
""")

          print("Waiting 120 seconds...", flush=True)

          for i in range(120, 0, -1):
              if i % 10 == 0:
                  print(f"{i} seconds remaining...", flush=True)
              time.sleep(1)

          print("Start polling...", flush=True)

          start = time.time()

          while True:

              if time.time() - start > expires:
                  print("Device code expired.", flush=True)
                  sys.exit(1)

              t = requests.post(
                  TOKEN_URL,
                  data={
                      "client_id": CLIENT_ID,
                      "client_secret": CLIENT_SECRET,
                      "device_code": device_code,
                      "grant_type": "urn:ietf:params:oauth:grant-type:device_code"
                  },
                  timeout=30
              )

              print("--------------------------------", flush=True)
              print("HTTP:", t.status_code, flush=True)

              try:
                  j = t.json()
              except:
                  print(t.text, flush=True)
                  sys.exit(1)

              print(json.dumps(j, indent=2), flush=True)

              if "refresh_token" in j:

                  token = j["refresh_token"]

                  print()
                  print("=" * 60, flush=True)
                  print("REFRESH TOKEN", flush=True)
                  print("=" * 60, flush=True)
                  print(token, flush=True)
                  print("=" * 60, flush=True)

                  if SUMMARY:
                      with open(SUMMARY, "a", encoding="utf-8") as f:
                          f.write(f"""

---

# Refresh Token
{token}
""")

                  sys.exit(0)

              err = j.get("error")

              if err == "authorization_pending":
                  pass

              elif err == "slow_down":
                  interval += 5
                  print("Google requested slower polling.", flush=True)

              elif err == "expired_token":
                  print("Device code expired.", flush=True)
                  sys.exit(1)

              else:
                  print("OAuth failed:", json.dumps(j, indent=2), flush=True)
                  sys.exit(1)

              time.sleep(interval)

          PY
